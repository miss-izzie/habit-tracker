    h += '<ul class="list sk-list">';
    habits.forEach(function (hh) {
      var dates = completions[hh.id] || [];
      var set = {};
      dates.forEach(function (x) { set[x] = true; });
      var cur = streakOf(dates), bst = bestStreakOf(dates);
      var strip = "";
      winDays.forEach(function (wd, p) {
        var on = !!set[wd.ds];
        var isToday = wd.off === 0;
        var lab = fullDate(wd.date) + (isToday ? " (today)" : "") + " \u00B7 " + (on ? "done" : "missed");
        strip += '<span class="sk-cell' + (p >= 14 ? " r" : "") + (isToday ? " is-today" : "") +
          '" tabindex="0" role="img" aria-label="' + esc(lab) + '">' +
          '<span class="sk-dot' + (on ? " on" : "") + '"></span>' +
          '<span class="sk-tip">' + esc(lab) + '</span></span>';
      });
      h += '<li class="sk-row"><div class="sk-head">' +
        '<span class="sk-name">' + esc(hh.name) + '</span>' +
        '<span class="sk-streak"><span class="sk-cur' + (cur === 0 ? " zero" : "") + '">' + cur + '</span>' +
        '<span class="sk-lab"> day' + (cur === 1 ? "" : "s") + '</span>' +
        '<span class="sk-best"> \u00B7 best ' + bst + '</span></span></div>' +
        '<div class="sk-strip">' + strip + '</div></li>';
    });
    h += '</ul>';
    h += '<div class="sk-legend"><span class="sk-leg"><span class="sk-dot on"></span>done</span>' +
      '<span class="sk-leg"><span class="sk-dot"></span>missed</span></div>';
    return h;
  }

  // ---- markup: appearance ----
  function appearHTML() {
    var isDefault = String(appearance.bg || "").toUpperCase() === DEFAULT_BG.toUpperCase();
    return '<footer class="appear"><span class="appear-lab">Background</span>' +
      '<input type="color" class="accent-picker" id="bgInput" value="' + esc(appearance.bg || DEFAULT_BG) + '" aria-label="Background color">' +
      (isDefault ? '' : '<button class="link" data-act="bg-revert">Revert</button>') +
      '</footer>';
  }

  function dataFootHTML() {
    if (importConfirm && pendingImport) {
      return '<footer class="data-foot"><span class="reset-confirm">Replace everything with this backup?' +
        '<button class="link danger" data-act="import-yes">Yes, replace</button>' +
        '<button class="link" data-act="import-no">Cancel</button></span></footer>';
    }
    return '<footer class="data-foot">' +
      '<button class="link" data-act="export">Export</button>' +
      '<button class="link" data-act="import">Import</button>' +
      (importError ? '<span class="data-err">' + esc(importError) + '</span>' : '') +
      '<input type="file" id="importFile" accept="application/json,.json" style="display:none"></footer>';
  }

  // ---- render ----
  function render() {
    var html = headerHTML() + tabsHTML();
    if (view === "streak") html += streakHTML();
    else if (view === "habits") html += habitsListHTML();
    else html += taskViewHTML(TAB_OF[view]);
    html += appearHTML();
    html += dataFootHTML();
    app.innerHTML = html;

    if (renameId != null) {
      var ri = app.querySelector(".rename-input");
      if (ri) { ri.focus(); var v = ri.value; ri.value = ""; ri.value = v; }
    }
  }

  // ---- events (delegated; #app persists across renders) ----
  app.addEventListener("click", function (e) {
    var skCell = e.target.closest(".sk-cell");
    if (skCell) {
      var wasOpen = skCell.classList.contains("tip-open");
      var opened = app.querySelectorAll(".sk-cell.tip-open");
      for (var oi = 0; oi < opened.length; oi++) opened[oi].classList.remove("tip-open");
      if (!wasOpen) skCell.classList.add("tip-open");
      return;
    }
    var el = e.target.closest("[data-act]");
    var act = el ? el.getAttribute("data-act") : null;
    var id = el ? el.getAttribute("data-id") : null;

    // commit an in-progress rename when clicking away (but let the row's own delete act run)
    if (renameId != null && act !== "del") {
      var rrow = e.target.closest(".row");
      var sameRow = rrow && rrow.getAttribute("data-id") === renameId;
      if (!sameRow) { commitRename(); if (!el) return; }
    }
    // close the move menu on any click that isn't opening or using it
    if (openMoveId && act !== "move-open" && act !== "move" && act !== "rename" && act !== "del") {
      openMoveId = null;
      if (!el) { render(); return; }
    }
    if (!el) return;

    if (act === "nav-tab") { view = el.getAttribute("data-view"); streakWin = 0; openMoveId = null; renameId = null; renameOrig = null; render(); }
    else if (act === "toggle") toggle(id);
    else if (act === "day-toggle") toggleHabitDay(el.getAttribute("data-habit"), el.getAttribute("data-date"));
    else if (act === "add") { if (view === "habits") addHabit(); else addTask(); }
    else if (act === "del") { if (view === "habits") remove(id); else removeTask(id); }
    else if (act === "task-toggle") toggleTask(id);
    else if (act === "rename") enterRename(id);
    else if (act === "rename-done") commitRename();
    else if (act === "move-open") { openMoveId = (openMoveId === id ? null : id); render(); }
    else if (act === "move") moveTask(id, el.getAttribute("data-to"));
    else if (act === "toggle-done") { doneOpen = !doneOpen; render(); }
    else if (act === "undone") undone(id);
    else if (act === "streak-prev") { streakWin++; render(); }
    else if (act === "streak-next") { if (streakWin > 0) streakWin--; render(); }
    else if (act === "bg-revert") { appearance.bg = DEFAULT_BG; saveAppearance(); applyTheme(); render(); }
    else if (act === "export") exportData();
    else if (act === "import") { importError = ""; var fi = document.getElementById("importFile"); if (fi) fi.click(); }
    else if (act === "import-yes") applyImport();
    else if (act === "import-no") { importConfirm = false; pendingImport = null; render(); }
  });

  app.addEventListener("input", function (e) {
    if (e.target.id === "addInput") {
      newName = e.target.value;
      var btn = app.querySelector(".add-btn");
      if (btn) btn.disabled = !newName.trim();
    } else if (e.target.classList.contains("rename-input")) {
      var item = curList()[curIndex(renameId)];
      if (item) { item.name = e.target.value; }
    } else if (e.target.id === "bgInput") {
      appearance.bg = e.target.value;   // live preview while dragging
      saveAppearance(); applyTheme();
    }
  });

  app.addEventListener("change", function (e) {
    if (e.target.id === "bgInput") {
      appearance.bg = e.target.value;   // commit; re-render to update Revert link
      saveAppearance(); applyTheme(); render();
    } else if (e.target.id === "importFile") {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var o = JSON.parse(reader.result);
          if (!o || (!o.habitData && !o.taskData && !o.appearance)) throw new Error("bad");
          pendingImport = o; importConfirm = true; importError = ""; render();
        } catch (err) {
          pendingImport = null; importConfirm = false; importError = "Couldn't read that file."; render();
        }
      };
      reader.readAsText(file);
    }
  });

  // tapping outside #app (page padding) also commits an in-progress rename.
  // Use the capture phase so containment is judged before any in-app re-render detaches the target.
  document.addEventListener("click", function (e) {
    var insideApp = app.contains(e.target);
    if (renameId == null) return;
    if (insideApp) return;  // in-app clicks are handled by the app listener
    commitRename();
  }, true);

  app.addEventListener("keydown", function (e) {
    if (e.target.id === "addInput" && e.key === "Enter") { if (view === "habits") addHabit(); else addTask(); }
    else if (e.target.classList.contains("rename-input")) {
      if (e.key === "Enter") { e.preventDefault(); commitRename(); }
      else if (e.key === "Escape") { e.preventDefault(); cancelRename(); }
    }
  });

  // ---- drag-to-reorder (task tabs only; pointer-based, touch-friendly) ----
  var drag = null;
  function getDragAfter(ul, y) {
    var rows = Array.prototype.slice.call(ul.querySelectorAll(".row[data-id]:not(.dragging)"));
    var closest = null, closestOffset = -Infinity;
    rows.forEach(function (r) {
      var box = r.getBoundingClientRect();
      var offset = y - (box.top + box.height / 2);
      if (offset < 0 && offset > closestOffset) { closestOffset = offset; closest = r; }
    });
    return closest;
  }
  function onDragMove(e) {
    if (!drag) return;
    if (Math.abs(e.clientY - drag.startY) > 3) drag.moved = true;
    var after = getDragAfter(drag.ul, e.clientY);
    if (after == null) {
      var addRow = drag.ul.querySelector(".add-row");
      if (addRow) drag.ul.insertBefore(drag.el, addRow); else drag.ul.appendChild(drag.el);
    } else {
      drag.ul.insertBefore(drag.el, after);
    }
  }
  function onDragUp() {
    if (!drag) return;
    document.removeEventListener("pointermove", onDragMove);
    document.removeEventListener("pointerup", onDragUp);
    drag.el.classList.remove("dragging");
    var moved = drag.moved, ul = drag.ul;
    drag = null;
    if (moved) {
      var ids = Array.prototype.slice.call(ul.querySelectorAll(".row[data-id]")).map(function (r) { return r.getAttribute("data-id"); });
      if (view === "habits") commitHabitOrder(ids);
      else commitDragOrder(TAB_OF[view], ids);
    }
  }
  app.addEventListener("pointerdown", function (e) {
    var grip = e.target.closest(".grip");
    if (!grip) return;
    if (renameId != null) return;
    var li = grip.closest(".row");
    if (!li) return;
    e.preventDefault();
    drag = { id: li.getAttribute("data-id"), el: li, ul: li.parentNode, startY: e.clientY, moved: false };
    li.classList.add("dragging");
    try { grip.setPointerCapture(e.pointerId); } catch (err) {}
    document.addEventListener("pointermove", onDragMove);
    document.addEventListener("pointerup", onDragUp);
  });

  load();
  applyTheme();
  render();
})();
</script>


</body></html>
